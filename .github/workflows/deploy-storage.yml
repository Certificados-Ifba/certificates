name: Deploy Storage Service

on:
  push:
    branches:
      - develop
    paths:
      - 'packages/backend/storage/**'

  workflow_dispatch:

jobs:

  deploy:
    runs-on: ubuntu-latest
    permissions: {}
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Trigger Coolify Deploy
        run: |
          curl --connect-timeout 5 --max-time 30 --retry 3 -X POST \
            --fail --fail-with-body --show-error \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_DEPLOY_TOKEN }}" \
            "${{ secrets.COOLIFY_STORAGE_WEBHOOK }}"
